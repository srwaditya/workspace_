<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Sliding Entrances</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="slide-in-down">This will slide in from the top!</div>
  <div class="slide-in-left">This will slide in from the left!</div>
  <div class="slide-in-right">This will slide in from the right!</div>
  <div class="slide-in-up">This will slide in from the bottom!</div>

</body>
</html>
